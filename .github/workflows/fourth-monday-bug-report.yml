name: Fourth Monday Bug Report

# Trigger on the fourth Monday of each month at 9 AM UTC
on:
  schedule:
    # Cron runs at 9 AM UTC on the 22nd-28th of each month
    - cron: '0 9 22-28 * 1'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  generate-bug-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7
      
      - name: Set up SAS Viya CLI
        env:
          SAS_SERVER: ${{ secrets.SAS_SERVER }}
          SAS_USERNAME: ${{ secrets.SAS_USERNAME }}
          SAS_PASSWORD: ${{ secrets.SAS_PASSWORD }}
          SAS_PORT: ${{ secrets.SAS_PORT }}
        run: |
          # Download and install SAS Viya CLI with proper error handling
          echo "Downloading SAS Viya CLI..."
          
          # Use the correct GitHub raw content URL or direct release URL
          curl -L -f -o sas-viya-ubuntu.deb \
            https://github.com/sassoftware/viya4-cli/releases/download/v1.0.0/sas-viya-ubuntu.deb \
            --connect-timeout 30 \
            --max-time 300 \
            -w "\nDownload completed with HTTP code: %{http_code}\n"
          
          # Verify file size and integrity
          FILE_SIZE=$(stat -f%z sas-viya-ubuntu.deb 2>/dev/null || stat -c%s sas-viya-ubuntu.deb 2>/dev/null || echo "0")
          echo "Downloaded file size: $FILE_SIZE bytes"
          
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Downloaded file is too small ($FILE_SIZE bytes). Likely incomplete download."
            cat sas-viya-ubuntu.deb
            exit 1
          fi
          
          # Attempt installation
          sudo dpkg -i sas-viya-ubuntu.deb || {
            echo "WARNING: dpkg installation failed. Trying apt fix..."
            sudo apt-get install -f -y || echo "Continuing without SAS Viya CLI..."
          }
          
          sas-viya --version || echo "SAS Viya CLI not available, will use alternative methods"
      
      - name: Run SAS SQL Query
        env:
          SAS_SERVER: ${{ secrets.SAS_SERVER }}
          SAS_USERNAME: ${{ secrets.SAS_USERNAME }}
          SAS_PASSWORD: ${{ secrets.SAS_PASSWORD }}
          SAS_PORT: ${{ secrets.SAS_PORT }}
        run: |
          echo "Running Fourth Monday Bug Report Query..."
          echo "Target table: cqm_prod.report_mart.fourth_monday_of_month"
          
          # Create a wrapper script for SAS execution
          cat > run_sas.sh << 'EOF'
          #!/bin/bash
          set -e
          
          # Check if fourth_monday_bug_report.sql exists
          if [ ! -f "fourth_monday_bug_report.sql" ]; then
            echo "ERROR: fourth_monday_bug_report.sql not found"
            exit 1
          fi
          
          # Execute SAS query
          if command -v sas &> /dev/null; then
            echo "Using local SAS installation..."
            sas -sysin fourth_monday_bug_report.sql -log report.log -print report.lst
          else
            echo "SAS not available. Attempting remote execution via SAS Viya..."
            
            # Verify SAS Viya server credentials are available
            if [ -z "$SAS_SERVER" ] || [ -z "$SAS_USERNAME" ] || [ -z "$SAS_PASSWORD" ]; then
              echo "ERROR: Missing SAS Viya server credentials (SAS_SERVER, SAS_USERNAME, SAS_PASSWORD)"
              exit 6
            fi
            
            SAS_PORT=${SAS_PORT:-443}
            
            # Use proper API endpoint for SAS Viya job submission
            # Replace /some/endpoint with actual SAS Viya compute service endpoint
            curl -s -k -X POST https://${SAS_SERVER}:${SAS_PORT}/compute/sessions \
              -u ${SAS_USERNAME}:${SAS_PASSWORD} \
              -H "Content-Type: application/json" \
              -d @fourth_monday_bug_report.sql \
              -o report.lst 2> report.log || {
                echo "Remote execution failed. Check SAS_SERVER, credentials, and network connectivity."
                exit 6
              }
          fi
          EOF
          
          chmod +x run_sas.sh
          ./run_sas.sh
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: bug-report-output
          path: |
            report.log
            report.lst
          retention-days: 30
